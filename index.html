<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Squat Analysis</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #000; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
  }
  #stage { position: fixed; inset: 0; width: 100%; height: 100%; }
  video { display: none; }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  /* HUD hidden — data sent via postMessage to Thunkable instead */
  #hud { display: none !important; }

  /* No-person warning hidden — Thunkable handles feedback display */
  #noPerson { display: none !important; }

  #startOverlay {
    position: fixed; inset: 0; z-index: 50;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    color: #eafff2; text-align: center; padding: 24px; box-sizing: border-box;
    pointer-events: none;
  }
  #startOverlay.visible {
    display: flex;
    background: rgba(5,7,10,0.92);
    pointer-events: auto;
  }
  #startOverlay h1 { font-size: 20px; margin-bottom: 8px; }
  #startOverlay p { color: #9fb8ac; max-width: 320px; margin-bottom: 22px; font-size: 13px; }
  #retryBtn {
    background: #17c980; color: #04140b; border: none; border-radius: 999px;
    padding: 14px 30px; font-size: 16px; font-weight: 700; cursor: pointer;
  }
  #retryBtn:active { transform: scale(0.97); }
  #errMsg { color: #ff8f8f; margin-top: 14px; font-size: 12px; max-width: 320px; }
</style>
</head>
<body>

<div id="stage">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>
</div>

<!-- Hidden HUD elements kept in DOM so JS references don't break -->
<div id="hud">
  <div class="row"><span class="label">Reps</span><span class="val" id="hudReps">0</span></div>
  <div class="row"><span class="label">Phase</span><span class="val" id="hudPhase">standing</span></div>
  <div class="cue good" id="hudCue">Get in position</div>
  <div class="row"><span id="hudDebug">--</span></div>
</div>

<!-- Hidden no-person warning -->
<div id="noPerson">No person detected</div>

<!-- Camera error / retry overlay -->
<div id="startOverlay">
  <h1>Camera access needed</h1>
  <p id="startStatus">Could not access the camera. Tap Retry and allow camera access when prompted.</p>
  <button id="retryBtn">Retry</button>
  <div id="errMsg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<script>
(function () {
  'use strict';

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const hudReps = document.getElementById('hudReps');
  const hudPhase = document.getElementById('hudPhase');
  const hudCue = document.getElementById('hudCue');
  const hudDebug = document.getElementById('hudDebug');
  const noPersonEl = document.getElementById('noPerson');
  const startOverlay = document.getElementById('startOverlay');
  const retryBtn = document.getElementById('retryBtn');
  const errMsg = document.getElementById('errMsg');

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  const LM = {
    L_SHOULDER: 11, R_SHOULDER: 12,
    L_HIP: 23, R_HIP: 24,
    L_KNEE: 25, R_KNEE: 26,
    L_ANKLE: 27, R_ANKLE: 28,
    L_HEEL: 29, R_HEEL: 30,
    L_FOOT: 31, R_FOOT: 32
  };
  const VIS_THRESHOLD = 0.6;

  function angleAtVertex(a, vertex, b) {
    const v1x = a.x - vertex.x, v1y = a.y - vertex.y;
    const v2x = b.x - vertex.x, v2y = b.y - vertex.y;
    const m1 = Math.hypot(v1x, v1y), m2 = Math.hypot(v2x, v2y);
    if (m1 === 0 || m2 === 0) return null;
    let cos = (v1x * v2x + v1y * v2y) / (m1 * m2);
    cos = Math.max(-1, Math.min(1, cos));
    return Math.acos(cos) * 180 / Math.PI;
  }

  function angleFromVertical(from, to) {
    const vx = to.x - from.x, vy = to.y - from.y;
    const mag = Math.hypot(vx, vy);
    if (mag === 0) return 0;
    let cos = (vy * -1) / mag;
    cos = Math.max(-1, Math.min(1, cos));
    return Math.acos(cos) * 180 / Math.PI;
  }

  let phase = 'standing';
  let prevHipY = null;
  let standingBaselineHipY = null;
  let descentCandidateStart = null;
  let standCandidateStart = null;
  let bottomHoldStart = null;
  let repDescStartTime = null;
  let repBottomTime = null;
  let repAscStartTime = null;
  let wentBelowParallel = false;
  let heelBaselineY = null;

  let maxKneeDevRep = 0, maxTorsoRep = 0, maxDepthDiffRep = -Infinity, maxHeelLiftRep = 0;

  let repCount = 0;
  let lastRepScores = null;
  let latestCue = 'Get in position';

  let liveKneeStatus = 'good';
  let liveDepthStatus = 'good';
  let liveTorsoStatus = 'good';
  let liveHeelStatus = 'good';

  let smoothedHipY = null;
  let activeSide = null;

  const MIN_PHASE_MS = 500;
  const DEPTH_PARALLEL_BAND = 0.015;

  function scoreKnee(dev) { return dev > 30 ? 1 : (dev >= 20 ? 2 : 3); }
  function scoreDepth(diff) { return diff > DEPTH_PARALLEL_BAND ? 3 : (diff >= -DEPTH_PARALLEL_BAND ? 2 : 1); }
  function scoreTorso(ang) { return ang > 45 ? 1 : (ang >= 30 ? 2 : 3); }
  function scoreHeel(lift) { return lift > 15 ? 1 : (lift >= 5 ? 2 : 3); }

  const CUES = {
    depth: 'Squat lower — get hips below your knees',
    knee: 'Keep your knees tracking over your toes',
    torso: 'Keep your chest up, lean forward less',
    heel: 'Keep your heels planted on the ground',
    good: 'Good rep!'
  };

  function completeRep() {
    const kneeScore = scoreKnee(maxKneeDevRep);
    const depthScore = scoreDepth(maxDepthDiffRep === -Infinity ? -1 : maxDepthDiffRep);
    const torsoScore = scoreTorso(maxTorsoRep);
    const heelScore = scoreHeel(maxHeelLiftRep);
    const average = (kneeScore + depthScore + torsoScore + heelScore) / 4;
    const verdict = average > 2.5 ? 'good' : (average >= 1.5 ? 'needs work' : 'bad');

    const ordered = [
      { key: 'depth', score: depthScore },
      { key: 'knee', score: kneeScore },
      { key: 'torso', score: torsoScore },
      { key: 'heel', score: heelScore }
    ];
    let worst = ordered[0];
    for (const o of ordered) if (o.score < worst.score) worst = o;

    lastRepScores = {
      knee: kneeScore,
      depth: depthScore,
      torso: torsoScore,
      heel: heelScore,
      average: Math.round(average * 100) / 100,
      verdict: verdict
    };
    latestCue = worst.score >= 3 ? CUES.good : CUES[worst.key];
    repCount += 1;
  }

  function processMetrics(m, now) {
    const { kneeDeviation, depthDiff, torsoAngle, heelYpx, hipY, legScale } = m;

    liveKneeStatus = kneeDeviation > 25 ? 'knees' : 'good';
    liveTorsoStatus = torsoAngle > 45 ? 'torso' : 'good';
    liveDepthStatus = depthDiff < -0.02 ? 'depth' : 'good';
    const liveHeelLift = heelBaselineY !== null ? (heelBaselineY - heelYpx) : 0;
    liveHeelStatus = liveHeelLift > 15 ? 'heels' : 'good';

    smoothedHipY = (smoothedHipY === null) ? hipY : (smoothedHipY * 0.6 + hipY * 0.4);

    const scale = Math.max(legScale, 0.03);
    const descendEps = scale * 0.25;
    const standEps = scale * 0.15;
    const reversalEps = scale * 0.04;

    if (prevHipY === null) prevHipY = smoothedHipY;

    switch (phase) {
      case 'standing': {
        standingBaselineHipY = (standingBaselineHipY === null) ? smoothedHipY : (standingBaselineHipY * 0.9 + smoothedHipY * 0.1);
        if (smoothedHipY - standingBaselineHipY > descendEps) {
          if (descentCandidateStart === null) descentCandidateStart = now;
          if (now - descentCandidateStart >= MIN_PHASE_MS) {
            phase = 'descending';
            repDescStartTime = descentCandidateStart;
            descentCandidateStart = null;
            wentBelowParallel = false;
            heelBaselineY = heelYpx;
            maxKneeDevRep = 0; maxTorsoRep = 0; maxDepthDiffRep = -Infinity; maxHeelLiftRep = 0;
          }
        } else {
          descentCandidateStart = null;
        }
        break;
      }
      case 'descending': {
        maxKneeDevRep = Math.max(maxKneeDevRep, kneeDeviation);
        maxTorsoRep = Math.max(maxTorsoRep, torsoAngle);
        maxDepthDiffRep = Math.max(maxDepthDiffRep, depthDiff);
        if (heelBaselineY !== null) maxHeelLiftRep = Math.max(maxHeelLiftRep, heelBaselineY - heelYpx);
        if (depthDiff >= 0) wentBelowParallel = true;
        if (smoothedHipY < prevHipY - reversalEps) {
          phase = 'bottom';
          repBottomTime = now;
          bottomHoldStart = now;
        }
        break;
      }
      case 'bottom': {
        maxKneeDevRep = Math.max(maxKneeDevRep, kneeDeviation);
        maxTorsoRep = Math.max(maxTorsoRep, torsoAngle);
        maxDepthDiffRep = Math.max(maxDepthDiffRep, depthDiff);
        if (heelBaselineY !== null) maxHeelLiftRep = Math.max(maxHeelLiftRep, heelBaselineY - heelYpx);
        if (depthDiff >= 0) wentBelowParallel = true;
        if (smoothedHipY < prevHipY - reversalEps * 0.5) {
          if (now - bottomHoldStart >= 100) {
            phase = 'ascending';
            repAscStartTime = now;
          }
        } else {
          bottomHoldStart = now;
          repBottomTime = now;
        }
        break;
      }
      case 'ascending': {
        maxKneeDevRep = Math.max(maxKneeDevRep, kneeDeviation);
        maxTorsoRep = Math.max(maxTorsoRep, torsoAngle);
        maxDepthDiffRep = Math.max(maxDepthDiffRep, depthDiff);
        if (heelBaselineY !== null) maxHeelLiftRep = Math.max(maxHeelLiftRep, heelBaselineY - heelYpx);
        if (standingBaselineHipY !== null && (smoothedHipY - standingBaselineHipY) <= standEps) {
          if (standCandidateStart === null) standCandidateStart = now;
          if (now - standCandidateStart >= MIN_PHASE_MS) {
            const descDuration = (repBottomTime || now) - repDescStartTime;
            const ascDuration = now - repAscStartTime;
            if (wentBelowParallel && descDuration >= MIN_PHASE_MS && ascDuration >= MIN_PHASE_MS) {
              completeRep();
            }
            phase = 'standing';
            standCandidateStart = null;
            descentCandidateStart = null;
          }
        } else {
          standCandidateStart = null;
        }
        break;
      }
    }

    prevHipY = smoothedHipY;

    if (hudDebug) {
      const baseline = standingBaselineHipY === null ? 0 : standingBaselineHipY;
      hudDebug.textContent =
        'hipY-base ' + (smoothedHipY - baseline).toFixed(3) +
        ' | depth ' + depthDiff.toFixed(3) +
        ' | went-parallel ' + (wentBelowParallel ? 'Y' : 'N');
    }
  }

  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

  function sideVisibility(lm, side) {
    const idxs = side === 'L'
      ? [LM.L_SHOULDER, LM.L_HIP, LM.L_KNEE, LM.L_ANKLE, LM.L_HEEL]
      : [LM.R_SHOULDER, LM.R_HIP, LM.R_KNEE, LM.R_ANKLE, LM.R_HEEL];
    let sum = 0;
    for (const i of idxs) sum += (lm[i] && typeof lm[i].visibility === 'number') ? lm[i].visibility : 0;
    return sum / idxs.length;
  }

  function computeMetrics(lm, canvasH) {
    const leftVis = sideVisibility(lm, 'L');
    const rightVis = sideVisibility(lm, 'R');

    if (activeSide === null) {
      activeSide = (leftVis >= rightVis) ? 'L' : 'R';
    } else if (activeSide === 'L' && rightVis > leftVis + 0.15) {
      activeSide = 'R';
    } else if (activeSide === 'R' && leftVis > rightVis + 0.15) {
      activeSide = 'L';
    }

    const sideVis = activeSide === 'L' ? leftVis : rightVis;
    if (sideVis < VIS_THRESHOLD) return null;

    const hip = lm[activeSide === 'L' ? LM.L_HIP : LM.R_HIP];
    const knee = lm[activeSide === 'L' ? LM.L_KNEE : LM.R_KNEE];
    const ankle = lm[activeSide === 'L' ? LM.L_ANKLE : LM.R_ANKLE];
    const heel = lm[activeSide === 'L' ? LM.L_HEEL : LM.R_HEEL];
    const shoulder = lm[activeSide === 'L' ? LM.L_SHOULDER : LM.R_SHOULDER];

    const dev = angleAtVertex(hip, knee, ankle);
    if (dev === null) return null;
    const kneeDeviation = Math.abs(180 - dev);

    const hipY = hip.y;
    const kneeY = knee.y;
    const depthDiff = hipY - kneeY;

    const torsoAngle = angleFromVertical(hip, shoulder);
    const heelYpx = heel.y * canvasH;
    const legScale = dist(hip, knee);

    return { kneeDeviation, depthDiff, torsoAngle, heelYpx, hipY, kneeY, legScale, side: activeSide };
  }

  function drawSkeleton(landmarks, drawW, drawH, offsetX, offsetY, statuses) {
    function toCanvas(p) { return { x: p.x * drawW + offsetX, y: p.y * drawH + offsetY }; }

    if (window.POSE_CONNECTIONS) {
      ctx.lineWidth = 3;
      ctx.strokeStyle = 'rgba(60,255,170,0.85)';
      for (const [i, j] of window.POSE_CONNECTIONS) {
        const a = landmarks[i], b = landmarks[j];
        if (!a || !b) continue;
        if ((a.visibility || 0) < 0.5 || (b.visibility || 0) < 0.5) continue;
        const pa = toCanvas(a), pb = toCanvas(b);
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.stroke();
      }
    }

    const flagged = new Set();
    if (statuses.knee === 'knees') { flagged.add(LM.L_KNEE); flagged.add(LM.R_KNEE); }
    if (statuses.torso === 'torso') { flagged.add(LM.L_SHOULDER); flagged.add(LM.R_SHOULDER); flagged.add(LM.L_HIP); flagged.add(LM.R_HIP); }
    if (statuses.heel === 'heels') { flagged.add(LM.L_HEEL); flagged.add(LM.R_HEEL); }

    landmarks.forEach((p, idx) => {
      if (!p || (p.visibility || 0) < 0.5) return;
      const c = toCanvas(p);
      ctx.beginPath();
      ctx.arc(c.x, c.y, flagged.has(idx) ? 6 : 4, 0, Math.PI * 2);
      ctx.fillStyle = flagged.has(idx) ? '#ff5252' : '#2effa3';
      ctx.fill();
    });
  }

  function updateHud() {
    if (hudReps) hudReps.textContent = String(repCount);
    if (hudPhase) hudPhase.textContent = phase;
    if (hudCue) {
      hudCue.textContent = latestCue;
      hudCue.classList.toggle('good', latestCue === CUES.good || latestCue === 'Get in position');
    }
  }

  const pose = new Pose({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });
  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    enableSegmentation: false,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6
  });

  pose.onResults((results) => {
    if (!canvas.width || !canvas.height) resizeCanvas();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const vw = results.image ? results.image.width : video.videoWidth;
    const vh = results.image ? results.image.height : video.videoHeight;
    if (!vw || !vh) return;

    const scale = Math.max(canvas.width / vw, canvas.height / vh);
    const drawW = vw * scale, drawH = vh * scale;
    const offsetX = (canvas.width - drawW) / 2;
    const offsetY = (canvas.height - drawH) / 2;

    ctx.drawImage(results.image, offsetX, offsetY, drawW, drawH);

    const landmarks = results.poseLandmarks;
    const now = performance.now();

    if (!landmarks || landmarks.length === 0) {
      updateHud();
      return;
    }

    const metrics = computeMetrics(landmarks, drawH);

    const statusesForDraw = {
      knee: metrics ? (metrics.kneeDeviation > 15 ? 'knees' : 'good') : 'good',
      torso: metrics ? (metrics.torsoAngle > 45 ? 'torso' : 'good') : 'good',
      heel: liveHeelStatus
    };
    drawSkeleton(landmarks, drawW, drawH, offsetX, offsetY, statusesForDraw);

    if (metrics) {
      processMetrics(metrics, now);
    }

    updateHud();
  });

  let camera = null;
  let cameraStarted = false;

  function startCamera() {
    if (cameraStarted) return;
    cameraStarted = true;
    errMsg.textContent = '';
    startOverlay.classList.remove('visible');
    try {
      camera = new Camera(video, {
        onFrame: async () => {
          try {
            await pose.send({ image: video });
          } catch (e) {}
        },
        width: 1280,
        height: 720
      });
      camera.start().then(() => {
        startOverlay.classList.remove('visible');
      }).catch((err) => {
        cameraStarted = false;
        errMsg.textContent = (err && err.message) ? err.message : String(err);
        startOverlay.classList.add('visible');
      });
    } catch (err) {
      cameraStarted = false;
      errMsg.textContent = (err && err.message) ? err.message : String(err);
      startOverlay.classList.add('visible');
    }
  }

  retryBtn.addEventListener('click', function() {
    cameraStarted = false;
    startCamera();
  });
  window.addEventListener('load', startCamera);
  if (document.readyState === 'complete') startCamera();

  // ---------- postMessage every 500ms — supports both React Native WebView and standard iframe ----------
  function sendToParent(payload) {
    const str = JSON.stringify(payload);
    try {
      // React Native WebView (Thunkable, Expo, etc.)
      if (window.ReactNativeWebView && typeof window.ReactNativeWebView.postMessage === 'function') {
        window.ReactNativeWebView.postMessage(str);
        return;
      }
    } catch (e) {}
    try {
      // Standard iframe / web fallback
      window.parent.postMessage(str, '*');
    } catch (e) {}
  }

  setInterval(() => {
    const payload = {
      repCount: repCount,
      kneeStatus: liveKneeStatus,
      depthStatus: liveDepthStatus,
      torsoStatus: liveTorsoStatus,
      heelStatus: liveHeelStatus,
      latestCue: latestCue,
      lastRepScores: lastRepScores,
      phase: phase
    };
    sendToParent(payload);
  }, 500);

})();
</script>
</body>
</html>
